<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-[2.5rem] w-full max-w-[450px] p-8 sm:p-12 shadow-2xl relative">
    
    <button (click)="closeModal()" class="absolute top-6 right-8 text-gray-400 hover:text-gray-600 transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <h1 class="text-3xl sm:text-4xl font-extrabold text-center text-gray-800 mb-10">
      Regístrate
    </h1>

    <div class="space-y-4 mb-8">
      <button class="w-full flex items-center justify-center gap-3 border border-gray-200 rounded-full py-3.5 hover:bg-gray-50 transition font-medium text-gray-700">
        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5 h-5" alt="Google">
        Seguir con Google
      </button>
      
      <button class="w-full flex items-center justify-center gap-3 border border-gray-200 rounded-full py-3.5 hover:bg-gray-50 transition font-medium text-gray-700">
        <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
          <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.74 1.18 0 2.45-1.01 4.12-.86 1.7.15 2.99.85 3.79 2.05-3.32 1.87-2.75 6.44.59 7.82-.6 1.48-1.42 2.94-2.58 4.18v-.01zM12.03 5.09c.63-1.07 1.94-2.09 3.47-2.09.28 1.91-1.63 3.55-3.32 3.55-.38 0-.82-.04-1.15-.17-.18-1.11.38-2.25 1-1.29z"/>
        </svg>
        Seguir con Apple
      </button>

      <button class="w-full flex items-center justify-center gap-3 border border-gray-200 rounded-full py-3.5 hover:bg-gray-50 transition font-medium text-gray-700">
        <svg class="w-5 h-5 text-blue-600 fill-current" viewBox="0 0 24 24">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        Seguir con Facebook
      </button>
    </div>

    <div class="flex items-center mb-8">
      <div class="flex-grow border-t border-gray-100"></div>
      <div class="mx-2 w-2 h-2 rounded-full border border-gray-300"></div>
      <div class="flex-grow border-t border-gray-100"></div>
    </div>

    <div class="text-center">
      <h2 class="text-lg font-bold text-gray-800 mb-8 cursor-pointer hover:text-gray-600 transition">
        Regístrate con el correo electrónico
      </h2>
      
      <p class="text-gray-700 font-medium">
        ¿Ya tienes una cuenta? 

        <button (click)="goToLogin()" class="text-indigo-500 hover:text-indigo-700 transition">
          Inicia sesión
        </button>
        
      </p>
    </div>

  </div>
</div>
