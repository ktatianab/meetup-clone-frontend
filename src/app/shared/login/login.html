<div class="w-full bg-white border-b border-gray-200 shadow-md z-40" *ngIf="showLogin">
    <div class="max-w-[900px] mx-auto p-5 sm:p-8">
        <div class="bg-white rounded-[2rem] w-full max-w-[500px] p-5 sm:p-8 shadow-lg relative mx-auto">
        
        <button (click)="closeModal()" class="relative top-0 right-0 text-gray-400 hover:text-gray-600 transition inline-block">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>

        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>

        <h1 class="text-xl sm:text-2xl font-bold text-center text-gray-900 mb-6 sm:mb-8">{{ isRegistering ? 'Crear cuenta' : 'Iniciar sesión' }}</h1>

        <div class="space-y-3" *ngIf="!isRegistering">
            <button class="w-full flex items-center justify-center gap-3 border border-gray-300 rounded-full py-3 hover:bg-gray-50 transition font-semibold text-gray-700 text-sm sm:text-base">
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
                </svg>
                Inicia sesión con Google
            </button>
            
            <button class="w-full flex items-center justify-center gap-3 border border-gray-300 rounded-full py-3 hover:bg-gray-50 transition font-semibold text-gray-800 text-sm sm:text-base">
                <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.74 1.18 0 2.45-1.01 4.12-.86 1.7.15 2.99.85 3.79 2.05-3.32 1.87-2.75 6.44.59 7.82-.6 1.48-1.42 2.94-2.58 4.18v-.01zM12.03 5.09c.63-1.07 1.94-2.09 3.47-2.09.28 1.91-1.63 3.55-3.32 3.55-.38 0-.82-.04-1.15-.17-.18-1.11.38-2.25 1-1.29z"/>
                </svg>
                Inicia sesión con Apple
            </button>

            <button class="w-full flex items-center justify-center gap-3 border border-gray-300 rounded-full py-3 hover:bg-gray-50 transition font-semibold text-gray-800 text-sm sm:text-base">
                <svg class="w-5 h-5 text-blue-600 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
                Inicia sesión con Facebook
            </button>
        </div>

        <div class="flex items-center my-6" *ngIf="!isRegistering">
            <div class="flex-grow border-t border-gray-200"></div>
            <span class="mx-4 text-gray-400 text-sm">o</span>
            <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <form class="space-y-4" *ngIf="!isRegistering">
            <div>
                <label class="block text-sm font-bold text-gray-800 mb-1">Correo electrónico</label>
                <input 
                    type="email" 
                    [(ngModel)]="email"
                    name="email"
                    class="w-full border border-gray-200 rounded-full px-4 py-3 focus:outline-none focus:border-gray-400 focus:ring-1 focus:ring-gray-400 transition text-black" 
                    required>
            </div>

            <div class="relative">
                <label class="block text-sm font-bold text-gray-800 mb-1">Contraseña</label>
                <input 
                    [type]="showPassword ? 'text' : 'password'" 
                    [(ngModel)]="password"
                    name="password"
                    class="w-full border border-gray-200 rounded-full px-4 py-3 focus:outline-none focus:border-gray-400 focus:ring-1 focus:ring-gray-400 transition text-black" 
                    required>
                <button 
                    type="button" 
                    (click)="togglePasswordVisibility()"
                    class="absolute right-4 top-[34px] text-gray-500 hover:text-gray-700">
                    <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                    <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            
<div 
    (click)="isRobotChecked = !isRobotChecked"
    class="flex items-center justify-between border border-gray-300 rounded-sm bg-gray-50 p-2 sm:p-3 my-4 w-full max-w-[300px] shadow-inner overflow-hidden cursor-pointer select-none hover:bg-gray-100 transition-colors">
    
    <div class="flex items-center gap-2 sm:gap-3">
        <div 
            class="w-6 h-6 border-2 border-gray-300 bg-white rounded-sm flex-shrink-0 flex items-center justify-center transition-all" 
            [class.border-blue-500]="isRobotChecked"
            [class.bg-white]="!isRobotChecked">
            
            <svg *ngIf="isRobotChecked" 
                 class="w-5 h-5 text-green-600 animar-check" 
                 xmlns="http://www.w3.org/2000/svg" 
                 viewBox="0 0 24 24" 
                 fill="none" 
                 stroke="currentColor" 
                 stroke-width="4" 
                 stroke-linecap="round" 
                 stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        
        <span class="text-sm font-medium text-gray-700 whitespace-nowrap">No soy un robot</span>
    </div>

    <div class="flex flex-col items-center justify-center text-[8px] text-gray-500 space-y-0.5 ml-2">
        <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="reCAPTCHA" class="w-7 h-7 sm:w-8 sm:h-8 opacity-70">
        <span class="leading-none hidden sm:inline">reCAPTCHA</span>
        <span class="leading-none text-[7px] sm:text-[8px] text-center">Privacidad - Términos</span>
    </div>
</div>
            <div class="flex items-start sm:items-center gap-3 mt-4">
                <div class="relative flex items-center pt-1 sm:pt-0">
                    <input type="checkbox" id="keep-connected" class="peer h-6 w-6 cursor-pointer appearance-none rounded-md bg-gray-900 border border-gray-900 checked:bg-gray-900 checked:border-transparent transition-all shrink-0" checked>
                    <svg class="absolute w-4 h-4 text-white left-1 pointer-events-none hidden peer-checked:block" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <label for="keep-connected" class="text-gray-900 font-bold text-sm cursor-pointer select-none leading-tight sm:leading-normal">Mantenerme conectado</label>
            </div>

            <button 
                type="button" 
                (click)="login()"
                [disabled]="!isLoginEnabled()"
                [class.cursor-not-allowed]="!isLoginEnabled()"
                [class.hover:bg-gray-700]="isLoginEnabled()"
                [class.hover:text-white]="isLoginEnabled()"
                [class.text-gray-400]="!isLoginEnabled()"
                [class.bg-gray-100]="!isLoginEnabled()"
                [class.bg-gray-900]="isLoginEnabled()"
                [class.text-white]="isLoginEnabled()"
                class="w-full font-bold py-3 rounded-full mt-6 transition text-sm sm:text-base">
                Iniciar sesión
            </button>
        </form>

        <!-- Formulario de Registro -->
        <form class="space-y-4" *ngIf="isRegistering">
            <div>
                <label class="block text-sm font-bold text-gray-800 mb-1">Correo electrónico</label>
                <input 
                    type="email" 
                    [(ngModel)]="email"
                    name="register-email"
                    class="w-full border border-gray-200 rounded-full px-4 py-3 focus:outline-none focus:border-gray-400 focus:ring-1 focus:ring-gray-400 transition text-black" 
                    required>
            </div>

            <div class="relative">
                <label class="block text-sm font-bold text-gray-800 mb-1">Contraseña</label>
                <input 
                    type="password" 
                    [(ngModel)]="registerPassword"
                    name="register-password"
                    class="w-full border border-gray-200 rounded-full px-4 py-3 focus:outline-none focus:border-gray-400 focus:ring-1 focus:ring-gray-400 transition text-black" 
                    required>
            </div>

            <div class="relative">
                <label class="block text-sm font-bold text-gray-800 mb-1">Confirmar Contraseña</label>
                <input 
                    type="password" 
                    [(ngModel)]="confirmPassword"
                    name="confirm-password"
                    class="w-full border border-gray-200 rounded-full px-4 py-3 focus:outline-none focus:border-gray-400 focus:ring-1 focus:ring-gray-400 transition text-black" 
                    required>
                <span *ngIf="registerPassword && confirmPassword && registerPassword !== confirmPassword" class="text-red-500 text-sm mt-1 block">
                    Las contraseñas no coinciden
                </span>
            </div>

            <button 
                type="button" 
                (click)="register()"
                [disabled]="!isRegisterEnabled()"
                [class.cursor-not-allowed]="!isRegisterEnabled()"
                [class.hover:bg-gray-700]="isRegisterEnabled()"
                [class.hover:text-white]="isRegisterEnabled()"
                [class.text-gray-400]="!isRegisterEnabled()"
                [class.bg-gray-100]="!isRegisterEnabled()"
                [class.bg-gray-900]="isRegisterEnabled()"
                [class.text-white]="isRegisterEnabled()"
                class="w-full font-bold py-3 rounded-full mt-6 transition text-sm sm:text-base">
                Crear cuenta
            </button>
        </form>
        <div class="text-center mt-6">
    @if (!isRegistering) {
      <button 
        type="button"
        (click)="goToRegister()" 
        class="text-indigo-600 font-bold text-sm hover:underline block w-full p-2">
        ¿No tienes cuenta? Regístrate
      </button>

      <a routerLink="/forgot-password" 
         class="text-indigo-600 font-bold text-sm hover:underline block p-2">
         ¿Olvidaste tu contraseña?
      </a>
    }

    @if (isRegistering) {
      <button 
        type="button"
        (click)="toggleRegister()" 
        class="text-indigo-600 font-bold text-sm hover:underline block w-full p-2">
        ¿Ya tienes cuenta? Inicia sesión
      </button>
    }
</div>
        </div>
    </div>
</div>
