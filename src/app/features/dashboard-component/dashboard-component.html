<div class="dashboard-container">
  <nav>
    <h1>Panel de Control</h1>
    <button (click)="logout()">Cerrar Sesión</button>
  </nav>

  <main>
    <section class="user-card">
      <h2>Bienvenido, {{ userData?.name }}</h2>
      <p>Tu rol es: <strong>{{ userData?.role }}</strong></p>
      <div class="token-debug">
        <small>Token actual en LocalStorage:</small>
        <code>{{ tokenAbbreviated }}</code>
      </div>
    </section>

    <section class="stats">
      <div class="card">Ventas: $1,200</div>
      <div class="card">Usuarios: 45</div>
    </section>
  </main>
</div>
